<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0710" />
  <meta name="color-scheme" content="dark" />
  <title>角色市场 · 封面</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="logo">Sm</div>
        <h1>角色市场</h1>
      </div>
      <span class="badge">仅封面</span>
    </header>

    <section id="marketSection">
      <div class="toolbar-row">
        <input class="field" id="searchInput" type="search" placeholder="搜索" enterkeyhint="search" />
        <input class="field" id="tagInput" type="text" placeholder="标签" />
        <select class="select" id="sortSelect">
          <option>最新</option>
          <option>随机</option>
          <option>浏览榜</option>
          <option>下载榜</option>
          <option>点赞榜</option>
        </select>
        <button type="button" class="btn primary" id="btnSearch">查询</button>
      </div>

      <div class="img-search-row">
        <label class="file-btn btn ghost">
          选择图片
          <input id="imgSearchFile" type="file" accept="image/*" hidden />
        </label>
        <img id="imgSearchPreview" class="img-preview hidden" alt="query" />
        <label class="scan-label" title="只保留高相似结果">阈值%
          <input class="field page-input" id="imgMinScore" type="number" min="30" max="95" value="72" inputmode="numeric" />
        </label>
        <button type="button" class="btn primary" id="btnImgSearch">以图搜图</button>
        <button type="button" class="btn ghost" id="btnCancelImg">取消</button>
        <button type="button" class="btn ghost hidden" id="btnClearImgSearch">退出搜图</button>
      </div>
      <div id="indexInfo" class="index-info">云端索引：加载中…</div>
      <div class="index-tip">访问时会在后台检查并补齐最新封面索引</div>

      <div id="status" class="status"></div>
      <div class="grid" id="grid"></div>
      <div class="pager" id="pager">
        <button type="button" class="btn ghost" id="btnPrev">上一页</button>
        <span class="page-pill" id="pageInfo">-</span>
        <button type="button" class="btn ghost" id="btnNext">下一页</button>
        <label class="page-jump">
          <span>到</span>
          <input class="field page-input" id="pageInput" type="number" min="1" inputmode="numeric" placeholder="页" />
          <span>页</span>
          <button type="button" class="btn primary" id="btnGoPage">跳转</button>
        </label>
      </div>
    </section>
  </div>
  <script src="./app.js" defer></script>
</body>
</html>
